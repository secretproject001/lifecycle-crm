<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecycle — Segments</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="segments.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><div class="logo-mark">L</div><span>LIFECYCLE</span></div>
                <button class="sidebar-collapse-btn" id="sidebarCollapse"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.4"/></svg></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" stroke="currentColor" stroke-width="1.3"/></svg><span>Dashboard</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3H14M2 8H14M2 13H9" stroke="currentColor" stroke-width="1.3"/></svg><span>Campaigns</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="4" height="4" stroke="currentColor" stroke-width="1.3"/><rect x="11" y="6" width="4" height="4" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="4" height="4" stroke="currentColor" stroke-width="1.3"/><path d="M5 5H8L11 8M5 11H8L11 8" stroke="currentColor" stroke-width="1.3"/></svg><span>Journeys</span></a>
                    <a href="segments.html" class="nav-item active"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14C2 11.2 4.7 9 8 9C11.3 9 14 11.2 14 14" stroke="currentColor" stroke-width="1.3"/></svg><span>Segments</span></a>
                    <a href="users.html" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 13C1 10.8 3.2 9 6 9C8.8 9 11 10.8 11 13" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M12 8C13.7 8 15 9.3 15 11" stroke="currentColor" stroke-width="1.3"/></svg><span>Users</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 14L5 9L9 11L15 4" stroke="currentColor" stroke-width="1.3"/><path d="M12 4H15V7" stroke="currentColor" stroke-width="1.3"/></svg><span>Analytics</span></a>
                </div>
                <div class="nav-section">
                    <span class="nav-label">CHANNELS</span>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" stroke="currentColor" stroke-width="1.3"/><path d="M1 4L8 9L15 4" stroke="currentColor" stroke-width="1.3"/></svg><span>Email</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="1" width="8" height="14" stroke="currentColor" stroke-width="1.3"/><path d="M7 13H9" stroke="currentColor" stroke-width="1.3"/></svg><span>Push</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3H14V12H5L2 15V3Z" stroke="currentColor" stroke-width="1.3"/></svg><span>SMS</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/></svg><span>WhatsApp</span></a>
                </div>
                <div class="nav-section">
                    <span class="nav-label">SYSTEM</span>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" stroke="currentColor" stroke-width="1.3"/><path d="M5 8H11M8 5V11" stroke="currentColor" stroke-width="1.3"/></svg><span>Integrations</span></a>
                    <a href="#" class="nav-item"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1V3M8 13V15M1 8H3M13 8H15" stroke="currentColor" stroke-width="1.3"/></svg><span>Settings</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><div class="user-info"><div class="user-avatar">A</div><div class="user-details"><span class="user-name">Anurag</span><span class="user-plan">PRO</span></div></div></div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle-btn" id="sidebarExpand"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4H14M2 8H14M2 12H14" stroke="currentColor" stroke-width="1.4"/></svg></button>
                    <div class="topbar-title-group">
                        <h1 class="page-title">Segments</h1>
                        <span class="page-subtitle">Create and manage audience segments</span>
                    </div>
                </div>
            </header>

            <div class="content">
                <!-- Segment Builder -->
                <div class="segment-builder-card">
                    <!-- Mode Toggle -->
                    <div class="builder-mode-row">
                        <label class="radio-label"><input type="radio" name="mode" value="all" /><span class="radio-custom"></span> All users</label>
                        <label class="radio-label"><input type="radio" name="mode" value="filter" checked /><span class="radio-custom"></span> Filter users by</label>
                        <button class="logic-toggle-btn" id="logicToggle">Inside blocks: AND · Between blocks: OR</button>
                    </div>

                    <div class="filter-area">
                        <!-- Filter Blocks -->
                        <div class="filter-groups" id="filterGroups"></div>

                        <!-- Add Block Button -->
                        <div class="add-filter-row">
                            <button class="add-filter-btn" id="addFilterBtn">+ Block</button>
                        </div>

                        <!-- Exclude -->
                        <div class="exclude-row">
                            <label class="checkbox-label">
                                <input type="checkbox" id="excludeToggle" />
                                <span class="checkbox-custom"></span>
                                Exclude Users
                            </label>
                        </div>
                        <div class="exclude-section" id="excludeSection" style="display:none">
                            <div class="filter-groups" id="excludeGroups"></div>
                            <div class="add-filter-row">
                                <button class="add-filter-btn secondary" id="addExcludeFilterBtn">+ Exclude Block</button>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Row -->
                    <div class="builder-actions-row">
                        <button class="reset-btn" id="resetBtn">↻ Reset Filters</button>
                        <div class="builder-actions-right">
                            <button class="actions-btn">+ Actions ▾</button>
                            <button class="show-count-btn" id="showCountBtn">Show count</button>
                        </div>
                    </div>

                    <!-- Results -->
                    <div class="query-results" id="queryResults" style="display:none">
                        <div class="results-header"><h4>Query Results</h4></div>
                        <table class="results-table">
                            <thead><tr><th>Query Time</th><th>Description</th><th>Source</th><th>User Count</th><th>Reachable Users</th></tr></thead>
                            <tbody id="queryResultsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="segments.js"></script>
</body>
</html>
